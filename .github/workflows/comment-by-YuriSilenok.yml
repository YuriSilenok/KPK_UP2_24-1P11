name: "Ask YuriSilenok to review approved PR"

on:
  pull_request_review:
    types: [submitted]

jobs:
  ask-yuri:
    if: ${{ github.event.review.state == 'approved' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write  # <-- Добавить эту строку
      contents: read
    
    steps:
      - name: Comment asking YuriSilenok to review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_AUTHOR=$(gh pr view $PR_NUMBER --json author --jq '.author.login' --repo $REPO)
          APPROVER="${{ github.event.review.user.login }}"
          
          gh pr comment $PR_NUMBER \
            --repo $REPO \
            --body "👋 @YuriSilenok, PR #$PR_NUMBER от @$PR_AUTHOR получил аппров от @$APPROVER. Пожалуйста, проверь код."
          
          echo "✅ Комментарий отправлен YuriSilenok"
