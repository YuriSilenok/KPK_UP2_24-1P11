name: "Ask YuriSilenok to review approved PR"

on:
  pull_request_review:
    types: [submitted]

jobs:
  ask-yuri:
    if: ${{ github.event.review.state == 'approved' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write  # <-- Добавить эту строку
      contents: read
    
    steps:
      - name: Comment asking YuriSilenok to review
        env:
          PAT_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          PR_AUTHOR=$(curl -s -H "Authorization: Bearer $PAT_TOKEN" \
            https://api.github.com/repos/$REPO/pulls/$PR_NUMBER | jq -r '.user.login')
          
          APPROVER="${{ github.event.review.user.login }}"
          BODY="👋 @YuriSilenok, PR #$PR_NUMBER от @$PR_AUTHOR получил аппров от @$APPROVER. Пожалуйста, проверь код."
          
          curl -X POST \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments \
            -d "{\"body\": \"$BODY\"}"
