name: "Assign YuriSilenok as reviewer on approval"

on:
  pull_request_target:
    types: [review_requested, ready_for_review]
  
  pull_request_review:
    types: [submitted]

jobs:
  assign-yuri-as-reviewer:
    if: ${{ github.event.review.state == 'approved'}}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Assign YuriSilenok as reviewer
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Получаем текущих ревьюеров
            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber
            });
            
            const currentReviewers = pr.requested_reviewers.map(r => r.login);
            
            // Если YuriSilenok уже ревьюер, пропускаем
            if (currentReviewers.includes('YuriSilenok')) {
              console.log('ℹ️ YuriSilenok уже назначен ревьюером');
              return;
            }
            
            // Назначаем YuriSilenok ревьюером
            await github.rest.pulls.requestReviewers({
              owner, repo, pull_number: prNumber,
              reviewers: ['YuriSilenok']
            });
            
            console.log('✅ YuriSilenok назначен ревьюером PR #' + prNumber);
            
            // Опционально: добавляем комментарий с пояснением
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: `👤 @YuriSilenok назначен проверяющим по запросу @${context.payload.sender?.login || 'системы'}`
            });
