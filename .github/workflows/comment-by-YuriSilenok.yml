name: "Ask YuriSilenok to review approved PR"

on:
  pull_request_review:
    types: [submitted]

jobs:
  ask-yuri:
    if: ${{ github.event.review.state == 'approved' && secrets.PAT_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get PR author and post comment
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Получаем автора PR через gh (который теперь использует PAT_TOKEN)
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq '.author.login')
          APPROVER="${{ github.event.review.user.login }}"
          
          # Формируем и публикуем комментарий
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "👋 @YuriSilenok, PR #$PR_NUMBER от @$PR_AUTHOR получил аппров от @$APPROVER. Пожалуйста, проверь код."
          
          curl -X POST \
            -H "Authorization: Bearer $PAT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments \
            -d "{\"body\": \"$BODY\"}"
